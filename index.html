<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개체군 생장 시뮬레이션</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f6fa;
            color: #2f3640;
            /* 고해상도 폰트 선명도 최적화 */
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .controls {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e1e8ed;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .control-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .checkbox-item {
            grid-column: span 2;
            justify-content: flex-start;
            gap: 10px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        .event-item {
            grid-column: span 2;
            border-top: 1px solid #ddd;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .btn-normal { background-color: #7f8c8d; }
        .btn-disaster { background-color: #e67e22; }
        .btn-disease { background-color: #9b59b6; }
        .btn-protect { background-color: #2ecc71; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
       
        label {
            font-weight: bold;
            font-size: 14px;
            min-width: 120px;
        }
        input[type="range"] {
            flex-grow: 1;
            margin-right: 10px;
        }
        .value-display {
            font-weight: bold;
            color: #3498db;
            width: 50px;
            text-align: right;
        }
        /* 화질 개선을 위해 캔버스 컨테이너 비율 고정 및 픽셀 리샘플링 최적화 */
        .canvas-container {
            position: relative;
            height: 450px;
            width: 100%;
        }
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

<div class="container">
    <h2> 개체군 생장 곡선 시뮬레이터</h2>
   
    <div class="controls">
        <div class="control-item">
            <label for="kSlider">환경 수용량 (K):</label>
            <input type="range" id="kSlider" min="200" max="2000" step="50" value="1000">
            <span id="kValue" class="value-display">1000</span>
        </div>
       
        <div class="control-item">
            <label for="nSlider">초기 개체수 (N₀):</label>
            <input type="range" id="nSlider" min="10" max="300" step="10" value="50">
            <span id="nValue" class="value-display">50</span>
        </div>

        <div class="control-item">
            <label for="rSlider">생장률 (r):</label>
            <input type="range" id="rSlider" min="0.1" max="1.0" step="0.05" value="0.5">
            <span id="rValue" class="value-display">0.5</span>
        </div>

        <div class="control-item checkbox-item">
            <input type="checkbox" id="resistanceCheck" checked>
            <label for="resistanceCheck" style="cursor:pointer; width: auto;">'환경 저항' 시각화하기</label>
        </div>

        <div class="event-item">
            <label>환경 변화</label>
            <div class="btn-group">
                <button class="btn-normal" onclick="triggerEvent('none')">정상 상태</button>
                <button class="btn-disaster" onclick="triggerEvent('disaster')">가뭄/홍수 (10세대 개체수 -60%)</button>
                <button class="btn-disease" onclick="triggerEvent('disease')">전염병 (8세대 생장률 급감)</button>
                <button class="btn-protect" onclick="triggerEvent('protect')">종 보호 조치 (환경 수용량 +500)</button>
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="growthChart"></canvas>
    </div>
</div>

<script>
    const kSlider = document.getElementById('kSlider');
    const nSlider = document.getElementById('nSlider');
    const rSlider = document.getElementById('rSlider');
    const resistanceCheck = document.getElementById('resistanceCheck');

    const kValue = document.getElementById('kValue');
    const nValue = document.getElementById('nValue');
    const rValue = document.getElementById('rValue');
    const ctx = document.getElementById('growthChart').getContext('2d');

    const generations = 20;
    const labels = Array.from({length: generations + 1}, (_, t) => `${t}세대`);

    let growthChart;
    let currentEvent = 'none'; // 현재 선택된 이벤트 상태 기본값

    function triggerEvent(eventType) {
        currentEvent = eventType;
        updateChart();
    }

    // 이벤트 조건이 반영된 데이터 계산 함수
    function calculateData(K, N0, r) {
        const exponentialData = [];
        const logisticData = [];
        const carryingCapacityData = [];
       
        let currentLogistic = N0;

        for (let t = 0; t <= generations; t++) {
            // 이벤트 적용을 위한 변수 변형
            let activeK = K;
            let activeR = r;

            if (currentEvent === 'protect' && t >= 10) {
                activeK = K + 500; // 10세대부터 환경 수용량 증가
            }
            if (currentEvent === 'disease' && t >= 8 && t <= 14) {
                activeR = r * 0.2; // 8~14세대 동안 전염병으로 생장률 급감
            }

            // 1. 지수 생장 계산
            exponentialData.push(N0 * Math.pow(1 + r, t));

            // 2. 로지스틱 생장 계산
            if (t === 0) {
                logisticData.push(N0);
            } else {
                let nextLogistic = currentLogistic + activeR * currentLogistic * (1 - currentLogistic / activeK);
               
                // 가뭄/홍수 이벤트: 10세대에 개체 수 60% 급감
                if (currentEvent === 'disaster' && t === 10) {
                    nextLogistic = currentLogistic * 0.4;
                }

                if (nextLogistic < 0) nextLogistic = 0;
                logisticData.push(nextLogistic);
                currentLogistic = nextLogistic;
            }

            // 3. 환경 수용량선 데이터
            carryingCapacityData.push(activeK);
        }
        return { exponentialData, logisticData, carryingCapacityData };
    }

    function initChart() {
        const K = parseInt(kSlider.value);
        const N0 = parseInt(nSlider.value);
        const r = parseFloat(rSlider.value);
       
        const { exponentialData, logisticData, carryingCapacityData } = calculateData(K, N0, r);

        growthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '지수 생장 (이론상 J자형)',
                        data: exponentialData,
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231, 76, 60, 0.15)',
                        borderWidth: 2,
                        pointRadius: 3,
                        tension: 0.1,
                        fill: false
                    },
                    {
                        label: '로지스틱 생장 (실제 S자형)',
                        data: logisticData,
                        borderColor: '#3498db',
                        backgroundColor: '#f5f6fa',
                        borderWidth: 3,
                        pointRadius: 3,
                        tension: 0.2,
                        fill: '-1'
                    },
                    {
                        label: '환경 수용량 (K)',
                        data: carryingCapacityData,
                        borderColor: '#7f8c8d',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        borderWidth: 1.5
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                devicePixelRatio: window.devicePixelRatio || 2, // ⭐ 화질 핵심: 디바이스 픽셀 비율에 맞춰 고해상도로 렌더링
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    x: { display: true },
                    y: {
                        display: true,
                        min: 0,
                        max: 2500
                    }
                }
            }
        });
        updateChart();
    }

    function updateChart() {
        const K = parseInt(kSlider.value);
        const N0 = parseInt(nSlider.value);
        const r = parseFloat(rSlider.value);

        kValue.textContent = K;
        nValue.textContent = N0;
        rValue.textContent = r;
       
        const { exponentialData, logisticData, carryingCapacityData } = calculateData(K, N0, r);
       
        growthChart.data.datasets[0].data = exponentialData;
        growthChart.data.datasets[1].data = logisticData;
        growthChart.data.datasets[2].data = carryingCapacityData;

        if (resistanceCheck.checked) {
            growthChart.data.datasets[0].backgroundColor = 'rgba(231, 76, 60, 0.15)';
            growthChart.data.datasets[1].fill = '-1';
        } else {
            growthChart.data.datasets[0].backgroundColor = 'transparent';
            growthChart.data.datasets[1].fill = false;
        }
       
        growthChart.update();
    }

    kSlider.addEventListener('input', updateChart);
    nSlider.addEventListener('input', updateChart);
    rSlider.addEventListener('input', updateChart);
    resistanceCheck.addEventListener('change', updateChart);

    initChart();
</script>

</body>
</html>
